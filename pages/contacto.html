<!DOCTYPE html>
<html lang="es">
    
<head>
    <title>Contacto</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap">
</head>

<body>
    <main>
        <nav>
        <span id="nombre-restaurante">El Rincón del Tapeo</span>
        <ul id="navegacion-cabecera">
          <li><a class="boton-cabecera" href="../index.html">Home</a></li>
          <li><a class="boton-cabecera" href="../pages/portfolio.html">Nuestros sabores</a></li>
          <li><a class="boton-cabecera" href="../pages/biografia.html">Nosotros</a></li>
          <li><a class="boton-cabecera" href="../pages/contacto.html">Contacto</a></li>
        </ul>
      </nav>
        <section id="contacto">
            <h1 id="titulo-contacto">¿Quieres hacer una reserva con nosotros?</h1>

            <form>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Nombre" required autocomplete="name">

                <label for="apellidos">Apellidos:</label>
                <input type="text" id ="apellidos" name= "apellidos" placeholder="Apellidos" required autocomplete="family-name"/>

                <label for="correo">Correo:</label>
                <input type="email" id ="correo" name="correo" placeholder="Correo electrónico" required autocomplete="email"/>

                <label for="telefono">Teléfono:</label>
                <input type="tel" id ="telefono" name="telefono" placeholder="Teléfono" required autocomplete="tel"/>

                <label for="fecha">Fecha:</label>
                <input type="date" id ="fecha" name="fecha" required>

                <label for="informacion">Información adicional:</label>
                <textarea id="informacion" name="informacion" placeholder="¿Necesitas darnos más información?"></textarea>

                <div class="botones-formulario">
                    <button type="submit">Enviar</button>
                    <button type="reset">Borrar</button>
                </div>
                
            </form>
        </section>
    </main>
    <footer>
        <p>© 2026 El Rincón del Tapeo. Todos los derechos reservados.</p>
    </footer>
    
</body>

</html>
